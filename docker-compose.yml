name: proscenium

services:
  web:
    build: .
    container_name: proscenium-web
    restart: unless-stopped
    ports:
      - "192.168.68.93:8788:8000"
    environment:
      CTRL_ALT_APP_ID: proscenium
      AXIOM_EFFECTIVE_BASE_URL: ${AXIOM_EFFECTIVE_BASE_URL:-http://192.168.68.93:7895}
      PROSCENIUM_HAIL_DELIVERY_BROKER_SECRET: ${PROSCENIUM_HAIL_DELIVERY_BROKER_SECRET:-}
      LCARD_OVERLAY_BROKER_SECRET: ${LCARD_OVERLAY_BROKER_SECRET:-}
    volumes:
      - ./data:/app/data
      # Binary Glyph Hero sources remain read-only from the former host until
      # their restrictive host ownership is migrated; all mutable state is local.
      - /mnt/temp/config/ctrl-alt-axiom/config/hails/glyph-hero-images:/app/config/hails/glyph-hero-images:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5)\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
